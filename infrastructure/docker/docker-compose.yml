version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: urban
      POSTGRES_USER: urban
      POSTGRES_PASSWORD: urban
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../../backend/.env
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data: